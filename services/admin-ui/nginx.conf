#
# NOTE on header inheritance: nginx drops ALL inherited add_header directives
# in any location block that declares its own add_header. The security-header
# set below is therefore REPEATED verbatim in every location block — do not
# "deduplicate" it back to server level or no response will carry it.
#
# CSP notes (this container is the single source of truth for the CSP):
# - script-src keeps 'unsafe-eval' because @rjsf/validator-ajv8 (ajv) compiles
#   JSON-schema validators at runtime via new Function(); removing it breaks
#   the Device Schema Editor. 'unsafe-inline' is needed by the inline boot
#   scripts in index.html.
# - img-src is restricted to self/data/blob plus the exact external hosts the
#   UI loads images from: OpenStreetMap tiles and the Leaflet marker icons on
#   cdnjs (see src/features/dashboard/components/DeviceMap.tsx).

server {
    # Unprivileged port: the container runs as non-root (USER nginxuser, uid
    # 1001) which cannot bind ports < 1024. The platform nginx proxies to
    # tesa-admin-ui:8080 and the compose healthcheck targets :8080.
    listen 8080;           # IPv4
    listen [::]:8080;      # IPv6
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # CRITICAL: Disable sendfile for Docker/VirtualBox compatibility
    # This prevents serving stale cached files
    sendfile off;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Version.json - serve directly, must come before catch-all
    location = /version.json {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        # --- security headers (must be repeated per location, see header note) ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://cdnjs.cloudflare.com https://api.dicebear.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' ws: wss: http://localhost:* ws://localhost:* https://localhost:* wss://localhost:* http://tesa-api:* https://tesa-api:*;" always;
    }

    # Health check endpoint
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        # --- security headers (must be repeated per location, see header note) ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://cdnjs.cloudflare.com https://api.dicebear.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' ws: wss: http://localhost:* ws://localhost:* https://localhost:* wss://localhost:* http://tesa-api:* https://tesa-api:*;" always;
        return 200 'healthy';
    }

    # API requests should be proxied to the API container by the main nginx
    # This container should never receive API requests directly

    # Hashed build assets (vite emits content-hashed filenames under /assets/)
    # are immutable: cache aggressively. index.html stays no-cache below, so a
    # new deploy always points browsers at fresh hashed files.
    # ^~ : prefix match that beats the regex static-file location below, so
    # hashed assets keep the immutable cache policy.
    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # --- security headers (must be repeated per location, see header note) ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://cdnjs.cloudflare.com https://api.dicebear.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' ws: wss: http://localhost:* ws://localhost:* https://localhost:* wss://localhost:* http://tesa-api:* https://tesa-api:*;" always;
    }

    # Non-hashed static files (images/, favicons, fonts shipped outside
    # /assets/): short revalidating cache.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "no-cache" always;
        etag on;
        # --- security headers (must be repeated per location, see header note) ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://cdnjs.cloudflare.com https://api.dicebear.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' ws: wss: http://localhost:* ws://localhost:* https://localhost:* wss://localhost:* http://tesa-api:* https://tesa-api:*;" always;
    }

    # React routing - serve index.html for all routes.
    # index.html must never be cached so deploys take effect immediately.
    location / {
        try_files $uri $uri/ /index.html;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;

        # Disable etag / If-Modified-Since for the SPA shell
        etag off;
        if_modified_since off;

        # --- security headers (must be repeated per location, see header note) ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://cdnjs.cloudflare.com https://api.dicebear.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' ws: wss: http://localhost:* ws://localhost:* https://localhost:* wss://localhost:* http://tesa-api:* https://tesa-api:*;" always;
    }
}

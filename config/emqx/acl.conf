## TESAIoT Community Edition - EMQX file-based ACL (single-org)
## ========================================================
## NOTE: This file is a documented FALLBACK only. In the CE platform the
## primary authorization source is the HTTP webhook to the API
## (/api/v1/emqx/acl), configured in emqx.conf. This file is NOT wired into
## emqx.conf by default; enable it manually (authorization.sources +=
## {type = file, ...}) only if you want an offline/deny-by-default fallback.
##
## Topic convention: device/{clientid}/telemetry/...  and
##                   device/{clientid}/commands/...

## -----------------------------------------------------------------------------
## Admin (dashboard / operator) - full access
## -----------------------------------------------------------------------------
{allow, {user, "admin"}, pubsub, ["$SYS/#", "#"]}.

## -----------------------------------------------------------------------------
## Internal telemetry bridge - device topics only
## -----------------------------------------------------------------------------
{allow, {user, "mqtt-bridge"}, pubsub, [
    "device/+/telemetry/#",
    "device/+/commands/config",
    "device/+/commands/status"
]}.

## -----------------------------------------------------------------------------
## Device access (client_id = device UUID, enforced by mTLS CN or webhook auth)
## Devices may publish telemetry/status and subscribe to their own config.
## -----------------------------------------------------------------------------
{allow, all, publish, [
    "device/${clientid}/telemetry/#",
    "device/${clientid}/commands/status"
]}.

{allow, all, subscribe, [
    "device/${clientid}/commands/config"
]}.

## -----------------------------------------------------------------------------
## Default deny (production security)
## -----------------------------------------------------------------------------
{deny, all}.

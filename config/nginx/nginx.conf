# Main nginx configuration. Loads all server blocks from conf.d/*.conf.
# Server-block specifics (serverTLS, mTLS) live in conf.d/.

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens   off;
    client_max_body_size 5m;

    # Docker internal DNS resolver (used for dynamic upstream resolution)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Rate-limit zones (single-org defaults; tune as needed)
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # Shared TLS session cache
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    include /etc/nginx/conf.d/*.conf;
}

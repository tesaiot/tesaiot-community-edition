#
# serverTLS (HTTPS) front for the Admin UI and the REST API.
# This is the standard browser-facing entrypoint. No client certificate is
# required here (serverTLS only). For device mTLS use 30-iot-mtls.conf.
#
# Certificates (see README.md):
#   /etc/nginx/certs/server-cert.pem   server certificate (+ chain)
#   /etc/nginx/certs/server-key.pem    server private key
# These can be issued by the Vault PKI area or by Let's Encrypt.

server {
    listen 443 ssl;
    http2 on;

    # Single-org: serves whatever host is configured. Replace _ with your
    # FQDN if you want strict SNI matching.
    server_name _;

    # ---- serverTLS ----
    ssl_certificate     /etc/nginx/certs/server-cert.pem;
    ssl_certificate_key /etc/nginx/certs/server-key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    # Explicit modern AEAD-only suite list (no CBC / SHA-1) - same set as
    # config/apisix/config.yaml. TLS 1.3 suites are unaffected by ssl_ciphers.
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_ecdh_curve      prime256v1:secp384r1;
    # Session tickets would let a recorded ticket resume a session without
    # forward secrecy of the ticket key; disable (resumption via session cache).
    ssl_session_tickets off;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ---- Anti-spoofing: neutralise client-supplied device-auth headers ----
    # This is a serverTLS-only entrypoint: NO client certificate is verified
    # here, so this block must NEVER be able to assert a device identity. We
    # clear every X-Client-* header AND the X-MTLS-Gateway marker at server
    # scope, so a browser-side forged "X-Client-Verify: SUCCESS" (and/or a
    # guessed gateway marker) is overwritten to empty before reaching tesa-api.
    # The API then rejects it (MTLS_VERIFY_FAILED). Device mTLS lives ONLY in
    # 30-iot-mtls.conf, which performs a real client-cert verify first.
    proxy_set_header X-Client-Cert        "";
    proxy_set_header X-Client-Verify      "";
    proxy_set_header X-Client-S-DN        "";
    proxy_set_header X-Client-I-DN        "";
    proxy_set_header X-Client-Serial      "";
    proxy_set_header X-Client-Fingerprint "";
    proxy_set_header X-MTLS-Gateway       "";

    # ---- REST API ----
    # Trailing slash on purpose: match only the API namespace (/api/v1/...), so
    # SPA client-routes that merely start with "api" (e.g. /api-keys) fall
    # through to the admin UI below instead of being proxied to the backend
    # (which would 404 on a hard refresh / deep link).
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;

        # Resolved at request time via the Docker resolver (nginx.conf) so the
        # container starts even if the API is not yet up.
        set $api_upstream tesa-api:5566;
        proxy_pass http://$api_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (telemetry dashboard stream)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ---- Telemetry WebSocket ----
    # The API serves a native WebSocket at /ws (live telemetry / activity feed).
    # Exact match so only /ws is proxied to the backend; /ws/* deep links still
    # fall through to the SPA. Without this, /ws would hit the SPA and the
    # upgrade would fail.
    location = /ws {
        set $ws_upstream tesa-api:5566;
        proxy_pass http://$ws_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
    }

    # ---- Admin UI (React SPA, served by its own nginx container) ----
    location / {
        set $ui_upstream tesa-admin-ui:8080;
        proxy_pass http://$ui_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        return 503 "Service temporarily unavailable\n";
    }
}

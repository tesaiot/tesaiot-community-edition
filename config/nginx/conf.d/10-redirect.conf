# Plain HTTP -> HTTPS redirect for the single configured host.

server {
    listen 80 default_server;
    server_name _;

    # Allow ACME / Let's Encrypt http-01 challenge if used (optional override).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
